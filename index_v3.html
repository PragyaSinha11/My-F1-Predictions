<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Paddock Prediction Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #050505; color: #ffffff; margin: 0; overflow-x: hidden; }
    .orbitron { font-family: 'Orbitron', sans-serif; }
    .glow-text { text-shadow: 0 0 15px rgba(225, 6, 0, 0.7); }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .f1-red { color: #e10600; }
    .bg-f1-red { background-color: #e10600; }
    
    /* Animated Modal Overlay */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); 
      backdrop-filter: blur(8px); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease;
    }
    
    .modal-content {
      background: linear-gradient(145deg, #121212, #080808);
      border-top: 4px solid #e10600;
      box-shadow: 0 25px 50px -12px rgba(225, 6, 0, 0.2);
      transform-origin: center;
      animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    .btn-primary {
      background: #e10600; transition: all 0.3s ease;
    }
    .btn-primary:hover { background: #ff0800; transform: translateY(-2px); box-shadow: 0 0 20px rgba(225, 6, 0, 0.5); }
    
    .input-field {
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
      transition: border-color 0.3s;
    }
    .input-field:focus { border-color: #e10600; outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { createClient } = supabase;

    const supabaseClient = createClient(
      'https://gyzflcxqehesojhimokd.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5emZsY3hxZWhlc29qaGltb2tkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgxMzQ4MjcsImV4cCI6MjA4MzcxMDgyN30.fOW7qr9cNEUp6otJU2f-tXtOJxRX4Wge9R76OXE-_Tk'
    );

    const TEAM_COLORS = {
      'Mercedes': '#00D2BE', 'Red Bull Racing': '#0600EF', 'Ferrari': '#DC0000',
      'McLaren': '#FF8700', 'Alpine': '#0090FF', 'Aston Martin': '#006F62',
      'Haas': '#FFFFFF', 'AlphaTauri': '#2B4562', 'Williams': '#005AFF'
    };

    function App() {
      const [stage, setStage] = useState('lander');
      const [currentRoom, setCurrentRoom] = useState(null);
      const [currentSubRoomId, setCurrentSubRoomId] = useState(null);
      const [predictionText, setPredictionText] = useState('');
      const [selectedUser, setSelectedUser] = useState('');
      const [showPredModal, setShowPredModal] = useState(false);
      const [showCopyAlert, setShowCopyAlert] = useState(false);

      // Helper to update DB
      const updateRoomData = async (newData) => {
        const { data, error } = await supabaseClient
          .from('f1_rooms')
          .update({ data: newData })
          .eq('id', currentRoom.id)
          .select().single();
        if (!error) setCurrentRoom(data);
      };

      const handleAddPrediction = async () => {
        if (!predictionText || !selectedUser || !currentSubRoomId) return;

        const updatedSubRooms = currentRoom.data.sub_rooms.map(sr => {
          if (sr.id === currentSubRoomId) {
            return {
              ...sr,
              predictions: [...sr.predictions, {
                id: Math.random().toString(36).substr(2, 9),
                userId: selectedUser,
                text: predictionText,
                done: false
              }]
            };
          }
          return sr;
        });

        await updateRoomData({ ...currentRoom.data, sub_rooms: updatedSubRooms });
        setPredictionText('');
        setShowPredModal(false);
      };

      const copyToClipboard = () => {
        navigator.clipboard.writeText(currentRoom.code);
        setShowCopyAlert(true);
        setTimeout(() => setShowCopyAlert(false), 2000);
      };

      // Modal Component
      const PredictionModal = () => (
        <div className="modal-overlay">
          <div className="modal-content w-full max-w-md p-8 rounded-xl relative">
            <div className="absolute top-4 right-4 text-gray-500 hover:text-white cursor-pointer" onClick={() => setShowPredModal(false)}>✕</div>
            <h2 className="orbitron text-xl font-bold mb-6 italic">FILE PREDICTION</h2>
            
            <label className="block text-xs uppercase tracking-widest text-gray-400 mb-2">Select Driver</label>
            <select 
              className="input-field w-full mb-6 p-3 rounded text-white bg-[#1a1a1a]"
              value={selectedUser}
              onChange={(e) => setSelectedUser(e.target.value)}
            >
              <option value="">-- Choose Driver --</option>
              {currentRoom.data.participants.map(p => (
                <option key={p.id} value={p.id}>{p.name} ({p.team})</option>
              ))}
            </select>

            <label className="block text-xs uppercase tracking-widest text-gray-400 mb-2">The Verdict</label>
            <textarea 
              className="input-field w-full h-32 p-4 rounded text-white bg-[#1a1a1a] mb-6"
              placeholder="e.g. Verstappen DNF on Lap 12..."
              value={predictionText}
              onChange={(e) => setPredictionText(e.target.value)}
            />

            <button onClick={handleAddPrediction} className="btn-primary w-full py-4 rounded font-bold orbitron uppercase tracking-tighter">
              Confirm Entry
            </button>
          </div>
        </div>
      );

      // Copy Alert Component
      const CopyAlert = () => (
        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-[#e10600] px-6 py-3 rounded-full orbitron text-sm font-bold shadow-2xl animate-bounce">
          CODE COPIED TO CLIPBOARD
        </div>
      );

      // Simplify for the example - Logic for landing
      if (stage === 'lander') {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen">
            <h1 className="orbitron text-7xl font-black italic mb-10 glow-text">F1 PADDOCK</h1>
            <button 
              className="btn-primary px-10 py-4 rounded-lg orbitron font-bold"
              onClick={async () => {
                // Quick Room Creation for Demo
                const code = Math.random().toString(36).substr(2, 4).toUpperCase();
                const { data } = await supabaseClient.from('f1_rooms').insert([{ 
                  name: 'Grand Prix Lounge', code, data: { participants: [{id: '1', name: 'User', team: 'Ferrari'}], sub_rooms: [{id: 'r1', name: 'Monaco GP', predictions: []}] }
                }]).select().single();
                setCurrentRoom(data);
                setStage('paddock');
              }}
            >
              START ENGINE
            </button>
          </div>
        );
      }

      return (
        <div className="p-10 max-w-4xl mx-auto">
          <div className="flex justify-between items-center mb-10">
            <h1 className="orbitron text-3xl italic font-bold border-l-4 border-red-600 pl-4">{currentRoom.name}</h1>
            <button onClick={copyToClipboard} className="glass px-6 py-2 rounded-full hover:bg-white/10 transition">
              {currentRoom.code} <span className="ml-2 opacity-50 text-xs">COPY</span>
            </button>
          </div>

          <div className="grid gap-6">
            {currentRoom.data.sub_rooms.map(sr => (
              <div key={sr.id} className="glass p-6 rounded-xl flex justify-between items-center">
                <div>
                  <h3 className="orbitron text-xl font-bold">{sr.name}</h3>
                  <p className="text-gray-400 text-sm">{sr.predictions.length} predictions recorded</p>
                </div>
                <button 
                  onClick={() => { setCurrentSubRoomId(sr.id); setShowPredModal(true); }}
                  className="bg-white text-black px-6 py-2 rounded font-bold hover:bg-red-600 hover:text-white transition"
                >
                  + PREDICT
                </button>
              </div>
            ))}
          </div>

          {showPredModal && <PredictionModal />}
          {showCopyAlert && <CopyAlert />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
